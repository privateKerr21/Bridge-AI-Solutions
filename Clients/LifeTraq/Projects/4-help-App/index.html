<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-help - Speak to Hope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
/**
 * 4-help App - Hope Voice Assistant
 * Soft, Oracle-inspired design
 * Color Palette: #FCFAFA (off-white), #C8D3D5 (soft gray-blue), #A4B8C4 (muted blue)
 */

/* Reset & Base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #FCFAFA 0%, #E8EEEF 100%);
    min-height: 100vh;
    color: #2A3B47;
    overflow: hidden;
}

/* Voice Mode (Default) */
.voice-mode {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
}

.voice-container {
    text-align: center;
    max-width: 600px;
    width: 100%;
}

.main-title {
    font-size: 3rem;
    font-weight: 300;
    color: #2A3B47;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
}

.subtitle {
    font-size: 1rem;
    color: #6B7F8C;
    font-weight: 400;
    margin-bottom: 3rem;
}

/* Hope Circle */
.hope-circle-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 2rem auto;
}

.hope-circle {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s ease;
    background: linear-gradient(135deg, #FCFAFA 0%, #C8D3D5 100%);
    box-shadow:
        0 10px 40px rgba(164, 184, 196, 0.3),
        0 0 0 1px rgba(200, 211, 213, 0.5);
}

.hope-circle:hover {
    transform: scale(1.02);
}

.hope-circle.active {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% {
        box-shadow:
            0 10px 40px rgba(164, 184, 196, 0.3),
            0 0 0 1px rgba(200, 211, 213, 0.5);
    }
    50% {
        box-shadow:
            0 10px 60px rgba(164, 184, 196, 0.5),
            0 0 0 2px rgba(164, 184, 196, 0.8);
    }
}

/* Pulse Rings */
.pulse-ring,
.pulse-ring-2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 2px solid rgba(164, 184, 196, 0.6);
    opacity: 0;
    pointer-events: none;
}

.hope-circle.active .pulse-ring {
    animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

.hope-circle.active .pulse-ring-2 {
    animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.2, 1) infinite 1s;
}

@keyframes pulse-ring {
    0% {
        transform: translate(-50%, -50%) scale(0.95);
        opacity: 1;
    }
    100% {
        transform: translate(-50%, -50%) scale(1.3);
        opacity: 0;
    }
}

/* Hope Image */
.hope-image {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
}

/* Listening Indicator */
.listening-indicator {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(252, 250, 250, 0.95);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(164, 184, 196, 0.3);
}

.hope-circle.active .listening-indicator {
    display: flex;
}

.listening-indicator::before {
    content: '';
    width: 12px;
    height: 12px;
    background: #A4B8C4;
    border-radius: 50%;
    animation: listening-pulse 1.5s ease-in-out infinite;
}

@keyframes listening-pulse {
    0%, 100% {
        transform: scale(1);
        opacity: 1;
    }
    50% {
        transform: scale(1.5);
        opacity: 0.5;
    }
}

.tap-text {
    margin-top: 1.5rem;
    font-size: 0.95rem;
    color: #6B7F8C;
    font-weight: 400;
}

/* Text Mode Button */
.text-mode-button {
    margin: 2rem auto 0;
    padding: 1rem;
    width: 64px;
    height: 64px;
    background: rgba(252, 250, 250, 0.95);
    border: 1px solid #C8D3D5;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(164, 184, 196, 0.2);
}

.text-mode-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(164, 184, 196, 0.3);
    background: #FCFAFA;
}

.keyboard-icon {
    width: 32px;
    height: 32px;
    opacity: 0.7;
    transition: opacity 0.3s ease;
}

.text-mode-button:hover .keyboard-icon {
    opacity: 1;
}

/* Text Mode */
.text-mode {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.text-mode.hidden {
    display: none;
}

.text-container {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    background: #FCFAFA;
}

.text-header {
    display: flex;
    align-items: center;
    padding: 1.5rem;
    background: rgba(252, 250, 250, 0.98);
    border-bottom: 1px solid #E8EEEF;
    backdrop-filter: blur(10px);
}

.back-button {
    background: none;
    border: none;
    color: #6B7F8C;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: 8px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.back-button:hover {
    background: #E8EEEF;
    color: #2A3B47;
}

.text-header h2 {
    flex: 1;
    text-align: center;
    font-size: 1.25rem;
    font-weight: 500;
    color: #2A3B47;
}

.header-spacer {
    width: 40px;
}

/* Conversation Area */
.conversation-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #FCFAFA 0%, #F5F8F9 100%);
    padding: 2rem 1.5rem;
}

.messages {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.message-empty {
    text-align: center;
    padding: 3rem 2rem;
    color: #6B7F8C;
}

.message {
    display: flex;
    gap: 0.75rem;
    animation: messageSlide 0.3s ease;
}

@keyframes messageSlide {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message.user {
    flex-direction: row-reverse;
}

.message-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C8D3D5 0%, #A4B8C4 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    color: #FCFAFA;
    font-size: 0.9rem;
    flex-shrink: 0;
}

.message.user .message-avatar {
    background: linear-gradient(135deg, #A4B8C4 0%, #8FA3AF 100%);
}

.message-content {
    max-width: 70%;
    padding: 1rem 1.25rem;
    border-radius: 18px;
    background: rgba(252, 250, 250, 0.95);
    border: 1px solid #E8EEEF;
    box-shadow: 0 2px 8px rgba(164, 184, 196, 0.1);
}

.message.user .message-content {
    background: linear-gradient(135deg, #C8D3D5 0%, #B5C4CA 100%);
    color: #2A3B47;
    border: 1px solid #B5C4CA;
}

.message-speaker {
    font-size: 0.75rem;
    font-weight: 600;
    color: #6B7F8C;
    margin-bottom: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.message-text {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #2A3B47;
}

/* Text Input Controls */
.text-input-container {
    padding: 1.5rem;
    background: rgba(252, 250, 250, 0.98);
    border-top: 1px solid #E8EEEF;
    backdrop-filter: blur(10px);
    display: flex;
    gap: 0.75rem;
    align-items: center;
}

.text-input {
    flex: 1;
    padding: 1rem 1.25rem;
    background: #FCFAFA;
    border: 1px solid #C8D3D5;
    border-radius: 24px;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    color: #2A3B47;
    transition: all 0.3s ease;
}

.text-input:focus {
    outline: none;
    border-color: #A4B8C4;
    box-shadow: 0 0 0 3px rgba(164, 184, 196, 0.1);
}

.text-input::placeholder {
    color: #A4B8C4;
}

.send-button {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #C8D3D5 0%, #A4B8C4 100%);
    border: none;
    border-radius: 50%;
    color: #FCFAFA;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(164, 184, 196, 0.3);
    flex-shrink: 0;
}

.send-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(164, 184, 196, 0.4);
}

.send-button:active {
    transform: translateY(0);
}

.send-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Utility */
.hidden {
    display: none !important;
}

/* Responsive Design */
@media (max-width: 768px) {
    .main-title {
        font-size: 2.5rem;
    }

    .hope-circle {
        width: 240px;
        height: 240px;
    }

    .pulse-ring,
    .pulse-ring-2 {
        width: 240px;
        height: 240px;
    }

    .mode-toggle {
        bottom: 1.5rem;
        right: 1.5rem;
        width: 48px;
        height: 48px;
    }

    .message-content {
        max-width: 85%;
    }
}

@media (max-width: 480px) {
    .main-title {
        font-size: 2rem;
    }

    .hope-circle {
        width: 200px;
        height: 200px;
    }

    .pulse-ring,
    .pulse-ring-2 {
        width: 200px;
        height: 200px;
    }

    .conversation-area {
        padding: 1.5rem 1rem;
    }
}
    </style>
</head>
<body>
    <!-- Voice Mode (Default) -->
    <div class="voice-mode" id="voiceMode">
        <div class="voice-container">
            <h1 class="main-title">Speak to Hope</h1>
            <p class="subtitle">Press Hope to begin a voice conversation</p>

            <div class="hope-circle-container">
                <div class="hope-circle" id="hopeCircle">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring-2"></div>
                    <img src="Images/hope_01.jpeg" alt="Hope" class="hope-image">
                    <div class="listening-indicator" id="listeningIndicator"></div>
                </div>
                <p class="tap-text">Tap Hope to begin</p>
            </div>

            <button class="text-mode-button" id="showTextMode" aria-label="Switch to text conversation">
                <img src="Images/keyboard-icon-simple-design-free-vector.png" alt="Text conversation" class="keyboard-icon">
            </button>
        </div>
    </div>

    <!-- Text Mode -->
    <div class="text-mode hidden" id="textMode">
        <div class="text-container">
            <div class="text-header">
                <button class="back-button" id="backToVoice" aria-label="Back to voice mode">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h2>Conversation with Hope</h2>
                <div class="header-spacer"></div>
            </div>

            <div class="conversation-area">
                <iframe
                    src="https://hopeai4help-10035864.chipp.ai"
                    height="100%"
                    width="100%"
                    frameborder="0"
                    title="Hope AI | 4-HELP 💬"
                    allow="microphone; camera"
                    style="border: none; display: block; height: 100%;">
                </iframe>
            </div>
        </div>
    </div>

    <script>
/**
 * 4-help App - ElevenLabs Voice Agent Integration
 * Voice conversation interface using ElevenLabs Conversational AI
 */

class VoiceAssistant {
    constructor() {
        this.isConnected = false;
        this.isRecording = false;
        this.websocket = null;
        this.audioContext = null;
        this.mediaStream = null;
        // ElevenLabs Agent ID and API key for voice mode
        this.agentId = 'agent_2701kh4p4ehpe03a94h8pmhbxxa6';
        this.apiKey = 'sk_af398b207c12087b1b16dbe340b91c51aff16c0384aac1ae';

        // Chipp.ai API key for text mode
        this.chippApiKey = 'live_ffbdb9fb54f6ebbd1f324528e5f00df4c0e0e8c53c14c4cd3ba16fce4ddb65f7';
        this.chippAppId = 'hopeai4helpinbuild-10038341';

        // Audio queue for sequential playback
        this.audioQueue = [];
        this.isPlayingAudio = false;

        // Text conversation history
        this.conversationHistory = [];

        this.initializeElements();
        this.attachEventListeners();
        // this.updateStatus('ready', 'Ready to start');
    }

    initializeElements() {
        // Voice mode elements
        this.voiceMode = document.getElementById('voiceMode');
        this.hopeCircle = document.getElementById('hopeCircle');
        this.listeningIndicator = document.getElementById('listeningIndicator');

        // Text mode elements
        this.textMode = document.getElementById('textMode');

        // Mode toggle buttons
        this.showTextModeBtn = document.getElementById('showTextMode');
        this.backToVoiceBtn = document.getElementById('backToVoice');

        // Current mode
        this.currentMode = 'voice'; // 'voice' or 'text'
    }

    attachEventListeners() {
        // Hope circle click (voice mode)
        this.hopeCircle.addEventListener('click', () => this.toggleConversation());

        // Mode switching
        this.showTextModeBtn.addEventListener('click', () => this.switchToTextMode());
        this.backToVoiceBtn.addEventListener('click', () => this.switchToVoiceMode());
    }

    switchToTextMode() {
        this.currentMode = 'text';
        this.voiceMode.classList.add('hidden');
        this.textMode.classList.remove('hidden');
    }

    switchToVoiceMode() {
        this.currentMode = 'voice';
        this.textMode.classList.add('hidden');
        this.voiceMode.classList.remove('hidden');
    }

    async toggleConversation() {
        if (this.isConnected) {
            this.stopConversation();
        } else {
            await this.startConversation();
        }
    }

    async startConversation() {
        try {
            // this.updateStatus('connecting', 'Connecting...');
            this.hopeCircle.classList.add('active');

            // Request microphone access
            this.mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            // Initialize audio context
            this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                sampleRate: 16000
            });

            // Connect to ElevenLabs Conversational AI
            await this.connectToElevenLabs();

            this.isConnected = true;
            this.isRecording = true;
            // this.updateStatus('active', 'Listening');

            console.log('Conversation started');
        } catch (error) {
            console.error('Error starting conversation:', error);
            // this.updateStatus('error', 'Error: ' + error.message);
            this.hopeCircle.classList.remove('active');

            if (error.name === 'NotAllowedError') {
                alert('Microphone access is required. Please allow microphone permissions and try again.');
            } else {
                alert('Failed to start conversation: ' + error.message);
            }
        }
    }

    async connectToElevenLabs() {
        return new Promise((resolve, reject) => {
            // ElevenLabs Conversational AI WebSocket endpoint
            // Include API key and specify signed URL for audio output
            const wsUrl = `wss://api.elevenlabs.io/v1/convai/conversation?agent_id=${this.agentId}`;

            this.websocket = new WebSocket(wsUrl);

            this.websocket.onopen = () => {
                console.log('Connected to ElevenLabs');
                this.startAudioStreaming();
                resolve();
            };

            this.websocket.onmessage = (event) => {
                this.handleWebSocketMessage(event);
            };

            this.websocket.onerror = (error) => {
                console.error('WebSocket error:', error);
                reject(new Error('Failed to connect to ElevenLabs. Check your Agent ID.'));
            };

            this.websocket.onclose = () => {
                console.log('Disconnected from ElevenLabs');
                if (this.isConnected) {
                    this.stopConversation();
                }
            };
        });
    }

    startAudioStreaming() {
        if (!this.mediaStream || !this.audioContext) return;

        const source = this.audioContext.createMediaStreamSource(this.mediaStream);
        const processor = this.audioContext.createScriptProcessor(4096, 1, 1);

        source.connect(processor);
        processor.connect(this.audioContext.destination);

        processor.onaudioprocess = (e) => {
            if (!this.isRecording || !this.websocket || this.websocket.readyState !== WebSocket.OPEN) {
                return;
            }

            // Get audio data and convert to appropriate format
            const audioData = e.inputBuffer.getChannelData(0);
            const int16Data = this.floatTo16BitPCM(audioData);

            // Convert to base64 and send as JSON
            const base64Audio = this.arrayBufferToBase64(int16Data);
            this.websocket.send(JSON.stringify({
                user_audio_chunk: base64Audio
            }));
        };

        this.audioProcessor = processor;
    }

    floatTo16BitPCM(float32Array) {
        const int16Array = new Int16Array(float32Array.length);
        for (let i = 0; i < float32Array.length; i++) {
            const s = Math.max(-1, Math.min(1, float32Array[i]));
            int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return int16Array.buffer;
    }

    arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }

    handleWebSocketMessage(event) {
        try {
            console.log('Received message type:', typeof event.data, event.data instanceof Blob ? 'Blob' : 'Text');

            // Handle different message types from ElevenLabs
            if (event.data instanceof Blob) {
                console.log('Received audio blob:', event.data.size, 'bytes');
                // Audio response from agent
                this.playAudioResponse(event.data);
            } else {
                // Text/JSON response
                const data = JSON.parse(event.data);
                console.log('Received JSON message:', data);

                // Handle audio chunk in base64 format
                if (data.audio) {
                    console.log('Received base64 audio chunk');
                    this.playBase64Audio(data.audio);
                }

                // Handle audio event (alternative field name)
                if (data.audio_event && data.audio_event.audio_base_64) {
                    console.log('Received audio_event with base64 audio');
                    this.playBase64Audio(data.audio_event.audio_base_64);
                }

                // Handle agent response with text
                if (data.type === 'agent_response' && data.agent_response_event) {
                    const response = data.agent_response_event.agent_response;
                    console.log('Agent response text:', response);
                    this.addMessage('agent', response);
                }

                // Handle transcript messages
                if (data.type === 'transcript') {
                    if (data.role === 'user') {
                        this.addMessage('user', data.text);
                    } else if (data.role === 'agent') {
                        this.addMessage('agent', data.text);
                    }
                }

                // Handle user transcript
                if (data.type === 'user_transcript' && data.user_transcription_event) {
                    const transcription = data.user_transcription_event.user_transcript;
                    console.log('User transcript:', transcription);
                    this.addMessage('user', transcription);
                }

                // Handle interruption
                if (data.type === 'interruption') {
                    console.log('Agent interrupted');
                }

                // Handle other message types
                if (data.type === 'conversation_initiation_metadata') {
                    console.log('Conversation initiated:', data);
                }
            }
        } catch (error) {
            console.error('Error handling message:', error, event.data);
        }
    }

    async playAudioResponse(audioBlob) {
        try {
            const arrayBuffer = await audioBlob.arrayBuffer();
            const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);

            const source = this.audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(this.audioContext.destination);
            source.start(0);

            // this.updateStatus('active', 'Hope is speaking');

            source.onended = () => {
                if (this.isConnected) {
                    // this.updateStatus('active', 'Listening');
                }
            };
        } catch (error) {
            console.error('Error playing audio:', error);
        }
    }

    async playBase64Audio(base64Audio) {
        // Add audio chunk to queue
        this.audioQueue.push(base64Audio);
        console.log('Added audio chunk to queue. Queue length:', this.audioQueue.length);

        // Start processing queue if not already playing
        if (!this.isPlayingAudio) {
            this.processAudioQueue();
        }
    }

    async processAudioQueue() {
        if (this.audioQueue.length === 0) {
            this.isPlayingAudio = false;
            if (this.isConnected) {
                // this.updateStatus('active', 'Listening');
            }
            return;
        }

        this.isPlayingAudio = true;
        const base64Audio = this.audioQueue.shift();

        try {
            console.log('Processing audio chunk, length:', base64Audio.length);

            // Decode base64 to binary
            const binaryString = atob(base64Audio);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // ElevenLabs sends PCM16 audio at 22kHz, mono
            const sampleRate = 22050;
            const numChannels = 1;
            const int16Array = new Int16Array(bytes.buffer);

            // Create AudioBuffer
            const audioBuffer = this.audioContext.createBuffer(
                numChannels,
                int16Array.length,
                sampleRate
            );

            // Convert Int16 PCM to Float32
            const channelData = audioBuffer.getChannelData(0);
            for (let i = 0; i < int16Array.length; i++) {
                channelData[i] = int16Array[i] / 32768.0;
            }

            // Play the audio
            const source = this.audioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(this.audioContext.destination);

            // this.updateStatus('active', 'Hope is speaking');

            source.onended = () => {
                // Process next chunk in queue
                this.processAudioQueue();
            };

            source.start(0);

        } catch (error) {
            console.error('Error processing audio chunk:', error);
            // Continue with next chunk even if this one failed
            this.processAudioQueue();
        }
    }

    stopConversation() {
        this.isConnected = false;
        this.isRecording = false;

        // Clear audio queue
        this.audioQueue = [];
        this.isPlayingAudio = false;

        // Close WebSocket
        if (this.websocket) {
            this.websocket.close();
            this.websocket = null;
        }

        // Stop audio processor
        if (this.audioProcessor) {
            this.audioProcessor.disconnect();
            this.audioProcessor = null;
        }

        // Stop media stream
        if (this.mediaStream) {
            this.mediaStream.getTracks().forEach(track => track.stop());
            this.mediaStream = null;
        }

        // Close audio context
        if (this.audioContext) {
            this.audioContext.close();
            this.audioContext = null;
        }

        // this.updateStatus('ready', 'Ready');
        this.hopeCircle.classList.remove('active');

        console.log('Conversation ended');
    }

}

// Initialize the app when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
    // Check for HTTPS (required for microphone access)
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        alert('This app requires HTTPS to access the microphone. Please use HTTPS or run on localhost.');
    }

    // Initialize voice assistant
    window.voiceAssistant = new VoiceAssistant();
});
    </script>
