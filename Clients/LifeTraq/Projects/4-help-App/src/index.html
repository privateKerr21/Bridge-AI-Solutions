<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-help - Speak to Hope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Voice Mode (Default) -->
    <div class="voice-mode" id="voiceMode">
        <div class="voice-container">
            <h1 class="main-title">Speak to Hope</h1>
            <p class="subtitle">Press Hope to begin a voice conversation</p>

            <div class="hope-circle-container">
                <div class="hope-circle" id="hopeCircle">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring-2"></div>
                    <img src="../Images/hope_01.jpeg" alt="Hope" class="hope-image">
                    <div class="listening-indicator" id="listeningIndicator"></div>
                </div>
                <p class="tap-text">Tap Hope to begin</p>
            </div>

            <button class="text-mode-button" id="showTextMode" aria-label="Switch to text conversation">
                <img src="../Images/keyboard-icon-simple-design-free-vector.png" alt="Text conversation" class="keyboard-icon">
            </button>
        </div>
    </div>

    <!-- Text Mode -->
    <div class="text-mode hidden" id="textMode">
        <div class="text-container">
            <div class="text-header">
                <button class="back-button" id="backToVoice" aria-label="Back to voice mode">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h2>Conversation with Hope</h2>
                <div class="header-spacer"></div>
            </div>

            <div class="conversation-area">
                <iframe
                    src="https://hopeai4help-10035864.chipp.ai"
                    height="100%"
                    width="100%"
                    frameborder="0"
                    title="Hope AI | 4-HELP 💬"
                    allow="microphone; camera"
                    style="border: none; display: block; height: 100%;">
                </iframe>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
